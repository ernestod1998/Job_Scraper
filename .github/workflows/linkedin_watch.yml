name: LinkedIn MLE/DS Watcher

on:
  schedule:
    # 8 AM, 11 AM, 2 PM, 5 PM, 8 PM PDT = 15, 18, 21, 0, 3 UTC
    # (shifts by 1 hour during PST — acceptable drift)
    - cron: "0 0,3,15,18,21 * * *"

  workflow_dispatch:

jobs:
  scrape:
    name: LinkedIn scrape + email
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Scrape LinkedIn (last 1h)
        run: python scrape_jobs.py --linkedin-only

      - name: Commit results to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add linkedin_jobs.json linkedin_jobs.md linkedin_jobs.html
          git diff --cached --quiet || git commit -m "chore: update linkedin listings [$(date -u '+%Y-%m-%d %H:%MZ')]"
          git pull --rebase origin main
          git push

      - name: Send email with results
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python - <<'EOF'
          import os, smtplib, json
          from datetime import datetime
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText
          from zoneinfo import ZoneInfo

          user = os.environ["GMAIL_USER"]
          password = os.environ["GMAIL_APP_PASSWORD"]

          with open("linkedin_jobs.json") as f:
              data = json.load(f)
          with open("linkedin_jobs.md") as f:
              body_md = f.read()
          with open("linkedin_jobs.html") as f:
              body_html = f.read()

          total = data["total"]
          scraped_at = data["scraped_at"]

          now_pt = datetime.now(ZoneInfo("America/Los_Angeles"))
          hour = now_pt.hour % 12 or 12
          suffix = "AM" if now_pt.hour < 12 else "PM"
          slot = f"{hour}{suffix} PT"

          subject = f"🔥 LinkedIn {slot} — {total} role(s) in last hour [{scraped_at[:10]}]"

          msg = MIMEMultipart("alternative")
          msg["Subject"] = subject
          msg["From"] = user
          msg["To"] = user
          msg.attach(MIMEText(body_md, "plain", "utf-8"))
          msg.attach(MIMEText(body_html, "html", "utf-8"))

          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as smtp:
              smtp.login(user, password)
              smtp.sendmail(user, user, msg.as_string())

          print(f"✅ Email sent to {user}")
          EOF
