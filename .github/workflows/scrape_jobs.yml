name: Biotech MLE Job Scraper

on:
  # Candidate UTC hours for 6pm PT. A Pacific-time gate below handles PDT/PST.
  schedule:
    - cron: "0 1,2 * * *"

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  scrape:
    name: Scrape MLE Job Listings
    runs-on: ubuntu-latest

    permissions:
      contents: write  # needed to commit results back to repo

    steps:
      - name: Check Pacific schedule
        id: schedule_gate
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          hour_pt="$(TZ=America/Los_Angeles date +'%H')"
          if [ "$hour_pt" = "18" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping biotech scraper outside 6pm PT. Current PT hour: $hour_pt"
          fi

      - name: Checkout repo
        if: steps.schedule_gate.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.schedule_gate.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run scraper
        if: steps.schedule_gate.outputs.should_run == 'true'
        run: python scrape_jobs.py

      - name: Commit results to repo
        if: steps.schedule_gate.outputs.should_run == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add jobs.json jobs.md jobs.html
          git diff --cached --quiet || git commit -m "chore: update job listings [$(date -u '+%Y-%m-%d')]"
          git pull --rebase origin main
          git push

      - name: Check whether to send email
        if: steps.schedule_gate.outputs.should_run == 'true'
        id: email_gate
        run: |
          python - <<'EOF' >> "$GITHUB_OUTPUT"
          import json

          with open("jobs.json") as f:
              data = json.load(f)

          total = int(data.get("total", 0))
          print(f"should_email={'true' if total > 0 else 'false'}")
          EOF

      - name: Send email with results
        if: steps.schedule_gate.outputs.should_run == 'true' && steps.email_gate.outputs.should_email == 'true'
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python - <<'EOF'
          import os, smtplib, json
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText

          user = os.environ["GMAIL_USER"]
          password = os.environ["GMAIL_APP_PASSWORD"]

          with open("jobs.json") as f:
              data = json.load(f)
          with open("jobs.md") as f:
              body_md = f.read()
          with open("jobs.html") as f:
              body_html = f.read()

          total = data["total"]
          scraped_at = data["scraped_at"]
          subject = f"🧬 Biotech MLE Jobs — {total} role(s) [{scraped_at[:10]}]"

          msg = MIMEMultipart("alternative")
          msg["Subject"] = subject
          msg["From"] = user
          msg["To"] = user
          msg.attach(MIMEText(body_md, "plain", "utf-8"))
          msg.attach(MIMEText(body_html, "html", "utf-8"))

          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as smtp:
              smtp.login(user, password)
              smtp.sendmail(user, user, msg.as_string())

          print(f"✅ Email sent to {user}")
          EOF
